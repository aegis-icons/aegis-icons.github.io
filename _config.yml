exclude:
 - .sass-cache/
 - .jekyll-cache/
 - gemfiles/
 - Gemfile
 - Gemfile.lock
 - node_modules/
 - vendor/bundle/
 - vendor/cache/
 - vendor/gems/
 - vendor/ruby/
 - x__excluded/
 - z__bat-scripts/
 - z__sh-scripts/
 - LICENSE.md
 - README.md
 
defaults:
  - scope:
      path: "icons/p"
    values:
      image: true
      is_primary: true
  - scope:
      path: "icons/v"
    values:
      image: true
      is_variation: true
  - scope:
      path: "icons/g"
    values:
      image: true
      is_generic: true

sass:
  style: compressed
