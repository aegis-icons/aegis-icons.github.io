name: Monthly Update Website Icons

on:
  schedule:
    - cron: '0 0 2 * *'  # Runs at 00:00 UTC on the 2nd day of every month
  workflow_dispatch:      # Allows manual triggering

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          repository: aegis-icons/aegis-icons.github.io
          token: ${{ secrets.GITHUB_TOKEN }}
          path: website

      - name: Download latest release
        run: |
          curl -L -o icons.zip https://github.com/aegis-icons/aegis-icons/releases/latest/download/aegis-icons.zip

      - name: Extract and organise icons
        run: |
          # Extract the zip file
          unzip icons.zip -d temp_icons

          # Create target directories if they don't exist
          mkdir -p website/icons/primary
          mkdir -p website/icons/variations
          mkdir -p website/icons/generic
          mkdir -p website/icons/outdated

          # Move and replace files for primary icons
          if [ -d "temp_icons/icons/1_Primary" ]; then
            cp -rf temp_icons/icons/1_Primary/* website/icons/primary/
          else
            echo "Error: Source directory temp_icons/icons/1_Primary not found."
            exit 1
          fi

          # Move and replace files for variations icons
          if [ -d "temp_icons/icons/2_Variations" ]; then
            cp -rf temp_icons/icons/2_Variations/* website/icons/variations/
          else
            echo "Error: Source directory temp_icons/icons/2_Variations not found."
            exit 1
          fi

          # Move and replace files for generic icons
          if [ -d "temp_icons/icons/3_Generic" ]; then
            cp -rf temp_icons/icons/3_Generic/* website/icons/generic/
          else
            echo "Error: Source directory temp_icons/icons/3_Generic not found."
            exit 1
          fi

          # Move and replace files for outdated icons
          if [ -d "temp_icons/icons/4_Outdated" ]; then
            cp -rf temp_icons/icons/4_Outdated/* website/icons/outdated/
          else
            echo "Error: Source directory temp_icons/icons/4_Outdated not found."
            exit 1
          fi

          # Remove pack.json if it exists
          find website/icons -name "pack.json" -type f -delete

          # Navigate to the website directory
          cd website

          # Configure Git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Commit and push changes
          git add icons/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update icons to latest release"
            git push
          fi
