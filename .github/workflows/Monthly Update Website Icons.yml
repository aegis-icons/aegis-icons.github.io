name: Monthly Update Website Icons

on:
  schedule:
    - cron: '0 0 2 * *'
  workflow_dispatch:

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          repository: aegis-icons/aegis-icons.github.io
          token: ${{ secrets.GITHUB_TOKEN }}
          path: website

      - name: Download latest release
        run: |
          # Replace with the actual filename from the latest release
          curl -L -o icons.zip https://github.com/aegis-icons/aegis-icons/releases/latest/download/aegis-icons.zip

      - name: Check downloaded file
        run: file icons.zip

      - name: Extract and update icons
        run: |
          unzip icons.zip -d temp_icons
          cp -r temp_icons/* website/icons/
          cd website
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add icons/
          git commit -m "Update icons to latest release"
          git push
