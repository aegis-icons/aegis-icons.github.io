<html data-icon-grid="grid-normal">
<head>
<title>Icon grid preview — aegis-icons</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  #container {
    margin: 0 10px;
  }

  #drop-area {
    border: 2px dashed #ccc; 
    padding: 20px;
    text-align: center;
    cursor: pointer;
  }
  
  #preview-container {
    margin-top: 10px;
  }
  
  ul {
	  display: grid;
	  list-style: none;
	  justify-content: center;
	  grid-auto-flow: column;
	  grid-gap: 20px;
	  margin: 10px 0;
  }
  
  #icon-grid {
    position: absolute;
    z-index: 2;
    aspect-ratio: 1/1;
    width: calc(100% - 20px);
  }

  html[data-icon-grid="grid-normal"] #icon-grid
  { background: url(z_icon_grid.svg) center no-repeat; }
  
  html[data-icon-grid="grid-inverted"] #icon-grid
  { background: url(z_icon_grid_inverted_colors.svg) center no-repeat; }
  
  #preview { z-index: 1; }
</style>
</head>
<body>
<div id="container">
  <ul>
    <li>
      <input type="radio" name="iconGrid" id="grid-normal" value="grid-normal" checked>
      <label for="grid-normal">Normal icon grid</label>
    </li>
    <li>
      <input type="radio" name="iconGrid" id="grid-inverted" value="grid-inverted">
      <label for="grid-inverted">Inverted icon grid</label>
    </li>
  </ul>

  <div id="drop-area">
    Drag & drop <b>SVG file</b> here or click to select it
    <input type="file" id="file-input" accept=".svg" style="display: none;">
  </div>

  <div id="preview-container">
    <div id="icon-grid">
    </div>
    
    <img id="preview" style="display: none;">
  </div>
</div>

<script>
  var htmlSelector = document.querySelector('html');
  var themeColorRadios = document.querySelectorAll('input[type=radio][name="iconGrid"]');
  themeColorRadios.forEach((radio) => { radio.addEventListener('change', () => htmlSelector.dataset.iconGrid = radio.value); });

// ---------------------------------
// 🤖 CODE BELOW WAS GENERATED BY AI
// ---------------------------------
  const dropArea = document.getElementById('drop-area');
  const fileInput = document.getElementById('file-input');
  const preview = document.getElementById('preview');

  // Open file selector on click
  dropArea.addEventListener('click', () => fileInput.click());

  // Prevent default drag behaviors
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
    dropArea.addEventListener(event, e => {
      e.preventDefault();
      e.stopPropagation();
    });
  });

  // Highlight drop area
  dropArea.addEventListener('dragover', () => {
    dropArea.style.borderColor = '#007cba';
  });

  dropArea.addEventListener('dragleave', () => {
    dropArea.style.borderColor = '#ccc';
  });

  // Handle dropped files
  dropArea.addEventListener('drop', e => {
    const files = e.dataTransfer.files;
    if (files.length) fileInput.files = files;
  });

  // Handle file selection
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = () => {
        preview.src = reader.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });
</script>
</body>
