<!DOCTYPE html>
<html data-icon-grid="grid-normal">
<head>
<title>Icon grid preview – aegis-icons</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  body
  { background: #efedf2; /* <--- Aegis 3's light color for 2FA code sections */ }
  
  #container {
    margin: 20px 10px;
  }

  #drop-area {
    background: #fcfbfc;
    border: 2px dashed #ccc; 
    padding: 40px;
    text-align: center;
    cursor: pointer;
    margin: 20px 0;
  }
  
  ul {
	  display: grid;
	  list-style: none;
	  justify-content: center;
	  grid-auto-flow: column;
	  grid-gap: 20px;
	  margin: 10px 0;
  }
  
  #icon-grid {
    position: absolute;
    aspect-ratio: 1/1;
    width: calc(100% - 20px);
  }

  html[data-icon-grid="grid-normal"] #icon-grid
  { background: url(z_icon_grid.svg) center no-repeat; }
  
  html[data-icon-grid="grid-inverted"] #icon-grid
  { background: url(z_icon_grid_inverted_colors.svg) center no-repeat; }
  

</style>
</head>

<body>
<div id="container">
  <ul>
    <li>
      <input type="radio" name="iconGrid" id="grid-normal" value="grid-normal" checked>
      <label for="grid-normal">Normal icon grid</label>
    </li>
    <li>
      <input type="radio" name="iconGrid" id="grid-inverted" value="grid-inverted">
      <label for="grid-inverted">Inverted icon grid</label>
    </li>
  </ul>

  <div id="drop-area">
    <b>CTRL+V image from clipboard</b>, drag & drop or click here to select SVG file
    <input type="file" id="file-input" accept=".svg" style="display: none;">
  </div>
  
    <div id="icon-grid"></div>
    <img id="preview" style="visibility: hidden;">
</div>

<script>
  var htmlSelector = document.querySelector('html');
  var iconGridRadios = document.querySelectorAll('input[type=radio][name="iconGrid"]');
  iconGridRadios.forEach((radio) => { radio.addEventListener('change', () => htmlSelector.dataset.iconGrid = radio.value); });

// ---------------------------------
// 🤖 CODE BELOW WAS GENERATED BY AI
// ---------------------------------
  const dropArea = document.getElementById('drop-area');
  const fileInput = document.getElementById('file-input');
  const preview = document.getElementById('preview');

  // Open file selector on click
  dropArea.addEventListener('click', () => fileInput.click());

  // Prevent default drag behaviors
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
    dropArea.addEventListener(event, e => {
      e.preventDefault();
      e.stopPropagation();
    });
  });

  // Highlight drop area
  dropArea.addEventListener('dragover', () => {
    dropArea.style.borderColor = '#007cba';
  });

  ['dragleave', 'drop'].forEach(event => {
    dropArea.addEventListener(event, e => {
      dropArea.style.borderColor = '#ccc';
    });
  });

  // Handle dropped files
  dropArea.addEventListener('drop', e => {
    const files = e.dataTransfer.files;
    if (files.length) {
      const file = files[0];
      if (file.type === 'image/svg+xml') {
        const reader = new FileReader();
        reader.onload = () => {
          preview.src = reader.result;
          preview.style.visibility = 'inherit';
        };
        reader.readAsDataURL(file);
      }
    }
  });

  // Handle file selection
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = () => {
        preview.src = reader.result;
        preview.style.visibility = 'inherit';
      };
      reader.readAsDataURL(file);
    }
  });

  // Handle clipboard paste (Ctrl+V / Cmd+V)
  document.addEventListener('paste', e => {
    e.preventDefault();
    const items = e.clipboardData?.items;
    if (!items) return;

    for (let item of items) {
      if (item.type === 'text/html') {
        item.getAsString(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const img = doc.querySelector('img');
          const svg = doc.querySelector('svg');
          
          if (img && img.src) {
            preview.src = img.src;
            preview.style.visibility = 'inherit';
          } else if (svg) {
            const svgString = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            preview.src = url;
            preview.style.visibility = 'inherit';
          }
        });
        break;
      }
    }
  });
</script>
</body>

</html>
